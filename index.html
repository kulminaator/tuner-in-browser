<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromatic Music Instrument Tuner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .tuner-container {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .meter-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin-bottom: 30px;
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .meter {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .meter-scale {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 80%;
        }

        .needle {
            position: absolute;
            bottom: 10%;
            left: 50%;
            width: 4px;
            height: 60%;
            background: linear-gradient(to top, #ff4444, #ff6666);
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            transition: transform 0.15s ease-out;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        .needle::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #333;
            border-radius: 50%;
            border: 3px solid #ff4444;
        }

        .scale-marks {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .scale-mark {
            position: absolute;
            bottom: 10%;
            left: 50%;
            width: 2px;
            height: 30px;
            background: #666;
            transform-origin: bottom center;
        }

        .scale-mark.major {
            height: 40px;
            width: 3px;
            background: #888;
        }

        .scale-label {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 12px;
            font-weight: bold;
        }

        .note-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .current-note {
            font-size: 48px;
            font-weight: bold;
            color: #888;
            text-shadow: none;
            margin-bottom: 10px;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .current-note.in-tune {
            color: #4CAF50;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .current-note.close {
            color: #FFC107;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
        }

        .current-note.off {
            color: #ff5252;
            text-shadow: 0 0 15px rgba(255, 82, 82, 0.3);
        }

        .frequency {
            font-size: 18px;
            color: #aaa;
        }

        .cents-display {
            font-size: 16px;
            color: #fff;
            margin-top: 5px;
            transition: color 0.2s ease;
        }

        .cents-display.intune {
            color: #4CAF50;
        }

        .cents-display.close {
            color: #FFC107;
        }

        .cents-display.off {
            color: #ff5252;
        }

        .controls {
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.active {
            background: linear-gradient(135deg, #f44336 0%, #e91e63 100%);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="tuner-container">
        <h1>🎵 TUNER</h1>
        
        <div class="note-display">
            <div class="current-note" id="noteDisplay">--</div>
            <div class="frequency" id="frequencyDisplay">--- Hz</div>
            <div class="cents-display" id="centsDisplay">-- cents</div>
        </div>

        <div class="meter-container">
            <div class="meter">
                <div class="scale-marks" id="scaleMarks"></div>
                <div class="needle" id="needle"></div>
            </div>
        </div>

        <div class="controls">
            <button id="startButton">Start Tuner</button>
            <div class="status" id="status">Press Start to begin</div>
        </div>
    </div>

    <script type="module">
        import { detectPitch, frequencyToNote, PitchSmoothing } from './src/tuner.js';

        let audioContext;
        let analyser;
        let microphone;
        let scriptProcessor;
        let isActive = false;

        const startButton = document.getElementById('startButton');
        const noteDisplay = document.getElementById('noteDisplay');
        const frequencyDisplay = document.getElementById('frequencyDisplay');
        const centsDisplay = document.getElementById('centsDisplay');
        const needle = document.getElementById('needle');
        const status = document.getElementById('status');

        // Smoothing: 8-sample window, need 3 consecutive agreements to switch notes
        const pitchSmoother = new PitchSmoothing(8, 3);

        // Create scale marks
        const scaleMarks = document.getElementById('scaleMarks');
        for (let i = -50; i <= 50; i += 10) {
            const mark = document.createElement('div');
            mark.className = i === 0 ? 'scale-mark major' : 'scale-mark';
            mark.style.transform = `translateX(-50%) rotate(${i * 0.9}deg)`;

            if (i % 20 === 0) {
                const label = document.createElement('div');
                label.className = 'scale-label';
                label.textContent = i > 0 ? `+${i}` : i;
                mark.appendChild(label);
            }

            scaleMarks.appendChild(mark);
        }

        /**
         * Classify cents offset into a visual tier.
         *  ±0 .. ±5   → "in-tune"  (green)
         *  ±5 .. ±15  → "close"    (yellow)
         *  > ±15      → "off"      (red)
         */
        function tuneTier(cents) {
            const abs = Math.abs(cents);
            if (abs <= 5) return 'intune';
            if (abs <= 15) return 'close';
            return 'off';
        }

        // Update the display
        function updateDisplay(result) {
            if (!result) {
                noteDisplay.textContent = '--';
                noteDisplay.className = 'current-note';
                frequencyDisplay.textContent = '--- Hz';
                centsDisplay.textContent = '-- cents';
                centsDisplay.className = 'cents-display';
                needle.style.transform = 'translateX(-50%) rotate(0deg)';
                return;
            }

            noteDisplay.textContent = `${result.note}${result.octave}`;
            frequencyDisplay.textContent = `${result.frequency.toFixed(1)} Hz`;

            const cents = result.cents;
            const centsText = cents > 0 ? `+${cents}` : cents;
            centsDisplay.textContent = `${centsText} cents`;

            const tier = tuneTier(cents);

            // Apply colour tier to both note label and cents readout
            noteDisplay.className = `current-note ${tier}`;
            centsDisplay.className = `cents-display ${tier}`;

            // Rotate needle (-45 to +45 degrees based on cents)
            const needleRotation = Math.max(-45, Math.min(45, cents * 0.9));
            needle.style.transform = `translateX(-50%) rotate(${needleRotation}deg)`;
        }

        // Process audio
        function processAudio() {
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            const rawFreq = detectPitch(buffer, audioContext.sampleRate);
            const smoothed = pitchSmoother.update(rawFreq);
            updateDisplay(smoothed);
        }

        // Start/Stop tuner
        async function toggleTuner() {
            if (!isActive) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 4096;

                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);

                    scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                    analyser.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);
                    scriptProcessor.onaudioprocess = processAudio;

                    pitchSmoother.reset();
                    isActive = true;
                    startButton.textContent = 'Stop Tuner';
                    startButton.classList.add('active');
                    status.textContent = 'Listening...';
                } catch (error) {
                    console.error('Error accessing microphone:', error);
                    status.textContent = 'Error: Could not access microphone';
                }
            } else {
                if (scriptProcessor) {
                    scriptProcessor.disconnect();
                    scriptProcessor.onaudioprocess = null;
                }
                if (microphone) {
                    microphone.disconnect();
                    microphone.mediaStream.getTracks().forEach(track => track.stop());
                }
                if (analyser) {
                    analyser.disconnect();
                }
                if (audioContext) {
                    audioContext.close();
                }

                pitchSmoother.reset();
                isActive = false;
                startButton.textContent = 'Start Tuner';
                startButton.classList.remove('active');
                status.textContent = 'Stopped';
                updateDisplay(null);
            }
        }

        startButton.addEventListener('click', toggleTuner);
    </script>
</body>
</html>
